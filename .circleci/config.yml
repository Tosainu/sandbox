version: 2

jobs:
  build:
    environment:
      IMAGE_NAME: myon/circleci-test
    docker:
      - image: circleci/buildpack-deps
    steps:
      - checkout
      - setup_remote_docker
      - run: docker build -t $IMAGE_NAME:latest .

  publish:
    docker:
      - image: circleci/buildpack-deps
    steps:
      - setup_remote_docker
      - run: docker image ls

workflows:
  version: 2
  build:
    jobs:
      - build
      - publish:
          requires:
            - build
