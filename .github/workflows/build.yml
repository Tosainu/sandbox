name: Build
on:
  push:
    paths:
      - ".github/workflows/build.yml"
      - "**/Dockerfile"

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dockerfile:
          - actions-test

    env:
      DOCKERFILE_DIR: ${{ matrix.dockerfile }}
      IMAGE_NAME: docker.pkg.github.com/tosainu/sandbox/${{ matrix.dockerfile }}

    steps:
      - uses: actions/checkout@v2

      - run: docker build --pull -t $IMAGE_NAME:myon $DOCKERFILE_DIR

      - name: Push container images
        env:
          USERNAME: ${{ github.actor }}
          PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker login docker.pkg.github.com -u "$USERNAME" --password-stdin <<< "$PASSWORD"

          docker push $IMAGE_NAME:myon

          rm -rf ~/.docker
