name: Build
on:
  push:
    paths:
      - ".github/workflows/build.yaml"
      - "**/Dockerfile"

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dockerfile:
          - actions-test

    env:
      DOCKERFILE_DIR: ${{ matrix.dockerfile }}
      IMAGE_NAME: docker.pkg.github.com/${{ github.repository }}/${{ matrix.dockerfile }}

    steps:
      - uses: actions/checkout@v2

      - run: docker build --pull -t $IMAGE_NAME:latest $DOCKERFILE_DIR

      - name: Push container images
        env:
          USERNAME: ${{ github.actor }}
          PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker login docker.pkg.github.com -u "$USERNAME" --password-stdin <<< "$PASSWORD"

          tag=$(date -u +%Y%m%d)
          docker tag $IMAGE_NAME:latest $IMAGE_NAME:$tag
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$tag

          rm -rf ~/.docker
